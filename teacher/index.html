<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Management Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="../auth.js"></script>
  <script>
    AUTH.requireAuth();
    if (!AUTH.isTeacher() && !AUTH.isAdmin()) window.location.href = '../main/index.html';
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="../main/index.html" class="back-link">← Dashboard</a>
    <span class="nav-brand">Management Console</span>
    <div class="nav-right">
      <span id="nav-username"></span>
      <button onclick="AUTH.logout()" class="nav-btn">⏻ Logout</button>
    </div>
  </nav>

  <main class="content">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="users">Users</button>
      <button class="tab-btn" id="admin-tab-btn" data-tab="courses" style="display:none">Courses</button>
    </div>

    <!-- Users Tab -->
    <div id="tab-users" class="tab-panel active">
      <div class="panel-header">
        <h2>Users</h2>
        <button class="btn primary" id="add-student-btn">+ Add User</button>
      </div>
      <div style="margin-bottom:16px">
        <select id="group-filter" style="background:#1a1d27;border:1px solid #2e3248;border-radius:8px;padding:9px 14px;color:#e8eaf0;font-size:13px;font-family:inherit;outline:none;cursor:pointer">
          <option value="all">All Groups</option>
          <option value="students">Students</option>
          <option value="teachers">Teachers</option>
          <option value="admins">Admins</option>
        </select>
      </div>
      <div id="students-list" class="card-list"></div>

      <div id="add-student-form" class="form-card hidden">
        <h3>Create User Account</h3>
        <input type="text" id="s-username" placeholder="Username" />
        <input type="email" id="s-email" placeholder="Email" />
        <input type="password" id="s-password" placeholder="Password" />
        <div class="form-actions">
          <button class="btn" id="s-cancel">Cancel</button>
          <button class="btn primary" id="s-save">Create</button>
        </div>
        <p id="s-msg" class="msg"></p>
      </div>
    </div>

    <!-- Admin Tab -->
    <div id="tab-courses" class="tab-panel hidden">
      <div class="panel-header">
        <h2>Courses</h2>
        <button class="btn primary" id="add-class-btn">+ New Course</button>
      </div>
      <div id="classes-list" class="card-list"></div>

      <div id="add-class-form" class="form-card hidden">
        <h3>New Course</h3>
        <input type="text" id="c-name" placeholder="Course name (e.g. Grade 9 Math)" />
        <div class="form-actions">
          <button class="btn" id="c-cancel">Cancel</button>
          <button class="btn primary" id="c-save">Create</button>
        </div>
        <p id="c-msg" class="msg"></p>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
