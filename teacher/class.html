<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="../auth.js"></script>
  <script>
    AUTH.requireAuth();
    if (!AUTH.isTeacher() && !AUTH.isAdmin()) window.location.href = '../main/index.html';
  </script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="../theme.css" />
  <style>
    .section-title { font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;margin-bottom:16px; }
    table { width:100%;border-collapse:collapse;font-size:13px; }
    th { text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border); }
    td { padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--surface2); }
    .status-badge { display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600; }
    .badge-green { background:rgba(76,175,80,0.15);color:#4caf50; }
    .badge-red { background:rgba(224,82,82,0.12);color:#e05252; }
    .badge-yellow { background:var(--yellow-lt);color:var(--yellow); }
    .badge-muted { background:var(--surface2);color:var(--muted); }
    .attendance-btn { padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all 0.15s; }
    .attendance-btn.present { background:rgba(76,175,80,0.15);border-color:#4caf50;color:#4caf50; }
    .attendance-btn.absent { background:rgba(224,82,82,0.12);border-color:#e05252;color:#e05252; }
    .attendance-btn.late { background:var(--yellow-lt);border-color:var(--yellow);color:var(--yellow); }
    .session-date-input { background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.18s; }
    .session-date-input:focus { border-color:var(--yellow); }
    .time-input { background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;width:110px;transition:border-color 0.18s; }
    .time-input:focus { border-color:var(--yellow); }
    .upload-link { color:var(--yellow);text-decoration:none;font-size:12px; }
    .upload-link:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="back-link">← Classes</a>
    <span class="nav-brand" id="class-name">Class Detail</span>
    <div class="nav-right">
      <span id="nav-username"></span>
    </div>
  </nav>

  <main class="content">
    <div id="loading" style="color:var(--muted);font-size:14px;padding:40px 0;text-align:center">Loading...</div>
    <div id="main-content" style="display:none">

      <div class="tabs">
        <button class="tab-btn active" data-tab="schedule">Schedule</button>
        <button class="tab-btn" data-tab="attendance">Attendance</button>
        <button class="tab-btn" data-tab="hw-status">Homework Status</button>
      </div>

      <!-- SCHEDULE TAB -->
      <div id="tab-schedule" class="tab-panel active">
        <div class="panel-header">
          <h2>Schedule</h2>
          <button class="btn primary" id="save-schedule-btn">Save Schedule</button>
        </div>

        <div style="display:flex;gap:16px;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap">
          <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Number of sessions</label>
            <div style="display:flex;align-items:center;gap:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius,8px);overflow:hidden;width:fit-content">
              <button onclick="changeCount(-1)" style="background:none;border:none;border-right:1px solid var(--border);color:var(--muted);padding:8px 14px;cursor:pointer;font-size:16px;font-family:inherit;transition:all 0.15s;line-height:1" onmouseover="this.style.color='var(--yellow)'" onmouseout="this.style.color='var(--muted)'">−</button>
              <input type="number" id="session-count" min="1" max="52" value="1"
                style="background:transparent;border:none;color:var(--text);font-size:14px;font-family:inherit;outline:none;width:52px;text-align:center;padding:8px 4px" />
              <button onclick="changeCount(1)" style="background:none;border:none;border-left:1px solid var(--border);color:var(--muted);padding:8px 14px;cursor:pointer;font-size:16px;font-family:inherit;transition:all 0.15s;line-height:1" onmouseover="this.style.color='var(--yellow)'" onmouseout="this.style.color='var(--muted)'">+</button>
            </div>
          </div>
          <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Start time</label>
            <input type="time" id="start-time" class="time-input" />
          </div>
          <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">End time</label>
            <input type="time" id="end-time" class="time-input" />
          </div>
          <button class="btn" id="generate-sessions-btn">Generate dates</button>
        </div>

        <div id="sessions-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px"></div>
        <p id="schedule-msg" class="msg"></p>

        <!-- Saved schedule table -->
        <div id="saved-schedule-table" style="display:none;margin-top:24px">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;margin-bottom:12px">Saved Schedule</div>
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead>
              <tr>
                <th style="text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)">#</th>
                <th style="text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)">Date</th>
                <th style="text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)">Time</th>
                <th style="text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)"></th>
              </tr>
            </thead>
            <tbody id="saved-schedule-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- ATTENDANCE TAB -->
      <div id="tab-attendance" class="tab-panel hidden">
        <div class="panel-header">
          <h2>Attendance</h2>
        </div>
        <div style="margin-bottom:16px">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Select session date</label>
          <select id="attendance-date-select" class="filter-select" style="min-width:200px">
            <option value="">— pick a date —</option>
          </select>
        </div>
        <div id="attendance-table-wrap"></div>
        <div style="margin-top:16px">
          <button class="btn primary" id="save-attendance-btn" style="display:none">Save Attendance</button>
          <p id="attendance-msg" class="msg" style="margin-top:8px"></p>
        </div>
      </div>

      <!-- HOMEWORK STATUS TAB -->
      <div id="tab-hw-status" class="tab-panel hidden">
        <div class="panel-header">
          <h2>Homework Status</h2>
        </div>
        <div id="hw-status-wrap">
          <p style="color:var(--muted);font-size:13px">Loading...</p>
        </div>
      </div>

    </div>
  </main>

  <script>
    const classId = new URLSearchParams(window.location.search).get('id');
    if (!classId) window.location.href = 'index.html';

    const user = AUTH.getUser();
    document.getElementById('nav-username').textContent = user?.['cognito:username'] || '';

    let classData = {};
    let schedule = { sessions: [], startTime: '', endTime: '' };
    let members = [];
    let attendanceRecords = {};
    let hwStatus = { assignments: [], status: {} };

    // ---- TABS ----
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => { p.classList.remove('active'); p.classList.add('hidden'); });
        btn.classList.add('active');
        const panel = document.getElementById('tab-' + btn.dataset.tab);
        panel.classList.remove('hidden');
        panel.classList.add('active');
        if (btn.dataset.tab === 'attendance') renderAttendanceDateSelect();
        if (btn.dataset.tab === 'hw-status') loadHwStatus();
      });
    });

    // ---- INIT ----
    (async () => {
      const [classRes, scheduleRes] = await Promise.all([
        AUTH.api('GET', '/admin/classes'),
        AUTH.api('GET', `/admin/classes/${classId}/schedule`)
      ]);
      const classes = Array.isArray(classRes) ? classRes : [];
      classData = classes.find(c => c.sk === classId) || {};
      members = classData.members || [];
      document.getElementById('class-name').textContent = classData.name || 'Class Detail';

      if (scheduleRes.sessions) {
        schedule = scheduleRes;
        document.getElementById('session-count').value = schedule.sessions.length;
        document.getElementById('start-time').value = schedule.startTime || '';
        document.getElementById('end-time').value = schedule.endTime || '';
        renderSessionsList();
        renderSavedScheduleTable();
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('main-content').style.display = '';
    })();

    // ---- SCHEDULE ----
    window.changeCount = (delta) => {
      const input = document.getElementById('session-count');
      const val = Math.max(1, Math.min(52, (parseInt(input.value) || 1) + delta));
      input.value = val;
    };

    document.getElementById('generate-sessions-btn').addEventListener('click', () => {
      const count = parseInt(document.getElementById('session-count').value) || 1;
      // Keep existing dates if count matches, otherwise reset
      const existing = schedule.sessions || [];
      schedule.sessions = Array.from({ length: count }, (_, i) => existing[i] || '');
      renderSessionsList();
    });

    function renderSessionsList() {
      const list = document.getElementById('sessions-list');
      list.innerHTML = '';
      schedule.sessions.forEach((date, i) => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:12px';
        row.innerHTML = `
          <span style="font-size:13px;color:var(--muted);min-width:80px">Session ${i + 1}</span>
          <input type="date" class="session-date-input" data-idx="${i}" value="${date}" />`;
        row.querySelector('input').addEventListener('change', e => {
          schedule.sessions[i] = e.target.value;
        });
        list.appendChild(row);
      });
    }

    document.getElementById('save-schedule-btn').addEventListener('click', async () => {
      const msg = document.getElementById('schedule-msg');
      schedule.startTime = document.getElementById('start-time').value;
      schedule.endTime = document.getElementById('end-time').value;
      msg.textContent = 'Saving...'; msg.className = 'msg';
      const res = await AUTH.api('PUT', `/admin/classes/${classId}/schedule`, schedule);
      if (res.error) { msg.textContent = res.error; msg.className = 'msg error'; return; }
      msg.textContent = 'Schedule saved.'; msg.className = 'msg success';
      renderSavedScheduleTable();
      renderAttendanceDateSelect();
    });

    function renderSavedScheduleTable() {
      const sessions = schedule.sessions || [];
      if (!sessions.length) return;
      const tbody = document.getElementById('saved-schedule-tbody');
      const tableWrap = document.getElementById('saved-schedule-table');
      const startTime = schedule.startTime || '';
      const endTime = schedule.endTime || '';
      const timeStr = startTime
        ? `${fmtTime(startTime)}${endTime ? ' – ' + fmtTime(endTime) : ''}`
        : '—';
      const today = new Date().toISOString().split('T')[0];
      tbody.innerHTML = sessions.map((date, i) => {
        const isPast = date && date < today;
        const isToday = date === today;
        const rowStyle = isPast ? 'opacity:0.4' : '';
        const dateLabel = date ? fmtDate(date) : '<span style="color:var(--muted)">Not set</span>';
        const todayBadge = isToday ? ' <span style="font-size:10px;background:var(--yellow-lt);color:var(--yellow);border-radius:4px;padding:2px 6px;margin-left:6px">Today</span>' : '';
        return `<tr style="${rowStyle}">
          <td style="padding:10px 12px;border-bottom:1px solid var(--border);font-weight:500">${i + 1}</td>
          <td style="padding:10px 12px;border-bottom:1px solid var(--border)">${dateLabel}${todayBadge}</td>
          <td style="padding:10px 12px;border-bottom:1px solid var(--border);color:var(--muted)">${timeStr}</td>
          <td style="padding:10px 12px;border-bottom:1px solid var(--border)">
            <button class="btn sm ghost" onclick="editSession(${i})" style="font-size:11px;padding:4px 10px">Edit</button>
          </td>
        </tr>`;
      }).join('');
      tableWrap.style.display = '';
    }

    window.editSession = (idx) => {
      // Scroll to the sessions list and highlight the row
      document.getElementById('sessions-list').scrollIntoView({ behavior: 'smooth' });
      const inputs = document.querySelectorAll('.session-date-input');
      if (inputs[idx]) {
        inputs[idx].focus();
        inputs[idx].style.borderColor = 'var(--yellow)';
        inputs[idx].style.boxShadow = '0 0 0 3px rgba(249,168,37,0.2)';
        setTimeout(() => {
          inputs[idx].style.borderColor = '';
          inputs[idx].style.boxShadow = '';
        }, 2000);
      }
    };

    function fmtDate(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-CA', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
    }

    function fmtTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':');
      const hour = parseInt(h);
      const ampm = hour >= 12 ? 'PM' : 'AM';
      return `${hour % 12 || 12}:${m} ${ampm}`;
    }

    // ---- ATTENDANCE ----
    function renderAttendanceDateSelect() {
      const sel = document.getElementById('attendance-date-select');
      // Combine scheduled dates with any dates that have saved attendance
      const scheduledDates = (schedule.sessions || []).filter(Boolean);
      // Merge and deduplicate, sort descending
      const allDates = [...new Set([...scheduledDates])].sort((a, b) => b.localeCompare(a));
      sel.innerHTML = '<option value="">— pick a date —</option>' +
        allDates.map(d => {
          const label = new Date(d + 'T00:00:00').toLocaleDateString('en-CA', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
          return `<option value="${d}">${label}</option>`;
        }).join('');
    }

    document.getElementById('attendance-date-select').addEventListener('change', async (e) => {
      const date = e.target.value;
      const wrap = document.getElementById('attendance-table-wrap');
      const saveBtn = document.getElementById('save-attendance-btn');
      if (!date) { wrap.innerHTML = ''; saveBtn.style.display = 'none'; return; }

      const res = await AUTH.api('GET', `/admin/classes/${classId}/attendance/${date}`);
      attendanceRecords = res.records || {};

      if (!members.length) { wrap.innerHTML = '<p style="color:var(--muted);font-size:13px">No students in this class.</p>'; return; }

      wrap.innerHTML = `
        <table>
          <thead><tr><th>Student</th><th>Status</th></tr></thead>
          <tbody id="attendance-tbody"></tbody>
        </table>`;
      const tbody = document.getElementById('attendance-tbody');
      members.forEach(m => {
        const current = attendanceRecords[m] || 'absent';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-weight:500">${m}</td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="attendance-btn ${current==='present'?'present':''}" data-user="${m}" data-status="present">Present</button>
              <button class="attendance-btn ${current==='absent'?'absent':''}" data-user="${m}" data-status="absent">Absent</button>
              <button class="attendance-btn ${current==='late'?'late':''}" data-user="${m}" data-status="late">Late</button>
            </div>
          </td>`;
        tr.querySelectorAll('.attendance-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            attendanceRecords[m] = btn.dataset.status;
            tr.querySelectorAll('.attendance-btn').forEach(b => {
              b.className = 'attendance-btn' + (b.dataset.status === btn.dataset.status ? ` ${btn.dataset.status}` : '');
            });
          });
        });
        tbody.appendChild(tr);
      });
      saveBtn.style.display = '';
    });

    document.getElementById('save-attendance-btn').addEventListener('click', async () => {
      const date = document.getElementById('attendance-date-select').value;
      const msg = document.getElementById('attendance-msg');
      if (!date) return;
      msg.textContent = 'Saving...'; msg.className = 'msg';
      const res = await AUTH.api('PUT', `/admin/classes/${classId}/attendance/${date}`, { records: attendanceRecords });
      console.log('Attendance save response:', res);
      if (res.error) { msg.textContent = res.error; msg.className = 'msg error'; return; }
      msg.textContent = 'Attendance saved.'; msg.className = 'msg success';
    });

    // ---- HOMEWORK STATUS ----
    async function loadHwStatus() {
      const wrap = document.getElementById('hw-status-wrap');
      wrap.innerHTML = '<p style="color:var(--muted);font-size:13px">Loading...</p>';
      const res = await AUTH.api('GET', `/admin/classes/${classId}/hw-status`);
      if (res.error) { wrap.innerHTML = `<p style="color:var(--red);font-size:13px">${res.error}</p>`; return; }
      hwStatus = res;
      renderHwStatusTable();
    }

    function renderHwStatusTable() {
      const wrap = document.getElementById('hw-status-wrap');
      const assignments = hwStatus.assignments || [];
      const status = hwStatus.status || {};

      if (!assignments.length) { wrap.innerHTML = '<p style="color:var(--muted);font-size:13px">No assignments for this course yet.</p>'; return; }
      if (!members.length) { wrap.innerHTML = '<p style="color:var(--muted);font-size:13px">No students in this class.</p>'; return; }

      let html = `<div style="overflow-x:auto"><table>
        <thead><tr>
          <th>Student</th>
          ${assignments.map(a => `<th style="min-width:220px">${a.title}</th>`).join('')}
        </tr></thead>
        <tbody>`;

      members.forEach(m => {
        html += `<tr><td style="font-weight:500;white-space:nowrap;vertical-align:top;padding-top:14px">${m}</td>`;
        assignments.forEach(a => {
          const s = (status[m] || {})[a.sk] || {};
          const submitted = s.submitted;
          const markedFile = s.markedFile || '';
          const markedFileName = s.markedFileName || 'Marked';
          const submittedFiles = s.submittedFiles || [];

          html += `<td style="vertical-align:top">
            <div style="display:flex;flex-direction:column;gap:8px;padding:4px 0">

              <!-- Submission status -->
              <div style="display:flex;align-items:center;gap:8px">
                <span class="status-badge ${submitted ? 'badge-green' : 'badge-muted'}">${submitted ? '✓ Submitted' : '— Not submitted'}</span>
                <button class="btn sm ghost" onclick="toggleSubmitted('${m}','${a.sk}',${!submitted})" title="Toggle manually">✎</button>
              </div>

              <!-- Student submitted files -->
              <div id="sub-files-${m}-${a.sk}">
                <span style="font-size:11px;color:var(--muted)">Loading...</span>
              </div>

              <!-- Marked file -->
              <div>
                <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Marked:</div>
                <div id="marked-file-${m}-${a.sk}" style="margin-bottom:6px">
                  ${markedFile
                    ? `<a href="${markedFile}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:rgba(76,175,80,0.1);border:1px solid #4caf50;border-radius:6px;padding:4px 10px;text-decoration:none;color:#4caf50;font-size:12px">📄 ${markedFileName} ↓</a>`
                    : `<span style="font-size:12px;color:var(--muted)">Not uploaded</span>`}
                </div>
                <label style="display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:11px;color:var(--text);transition:border-color 0.15s"
                  onmouseover="this.style.borderColor='var(--yellow)'" onmouseout="this.style.borderColor='var(--border)'">
                  📤 Upload marked
                  <input type="file" style="display:none" onchange="uploadMarked(event,'${m}','${a.sk}')" />
                </label>
              </div>
            </div>
          </td>`;
        });
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      wrap.innerHTML = html;

      // Load submitted files for each student+assignment
      members.forEach(m => {
        assignments.forEach(async a => {
          const el = document.getElementById(`sub-files-${m}-${a.sk}`);
          if (!el) return;
          try {
            const sub = await AUTH.api('GET', `/submissions/${a.sk}`);
            const studentSub = Array.isArray(sub) ? sub.find(s => s.sk === m) : null;
            if (studentSub && (studentSub.files||[]).length) {
              el.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Submitted files:</div>` +
                studentSub.files.map(f =>
                  `<a href="${f.url}" target="_blank" download="${f.name}"
                    style="display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;text-decoration:none;color:var(--text);font-size:12px;margin-right:4px;margin-bottom:4px;transition:border-color 0.15s"
                    onmouseover="this.style.borderColor='var(--yellow)'" onmouseout="this.style.borderColor='var(--border)'">
                    📎 ${f.name} <span style="color:var(--muted);font-size:10px">↓</span>
                  </a>`
                ).join('');
              if (studentSub.note) {
                el.innerHTML += `<div style="font-size:12px;color:var(--muted);margin-top:4px;font-style:italic">"${studentSub.note}"</div>`;
              }
            } else {
              el.innerHTML = '<span style="font-size:12px;color:var(--muted)">No files submitted</span>';
            }
          } catch { el.innerHTML = ''; }
        });
      });
    }

    window.toggleSubmitted = async (username, assignmentId, newVal) => {
      await AUTH.api('PUT', `/admin/classes/${classId}/hw-status`, { username, assignmentId, submitted: newVal });
      loadHwStatus();
    };

    window.uploadMarked = async (e, username, assignmentId) => {
      const file = e.target.files[0];
      if (!file) return;
      const uploadRes = await AUTH.api('POST', '/upload-url', { filename: file.name, contentType: file.type });
      if (uploadRes.error) { alert('Upload failed: ' + uploadRes.error); return; }
      await fetch(uploadRes.uploadUrl, { method: 'PUT', body: file, headers: { 'Content-Type': file.type } });
      await AUTH.api('PUT', `/admin/classes/${classId}/hw-status`, {
        username, assignmentId,
        markedFile: uploadRes.publicUrl,
        markedFileName: file.name
      });
      const el = document.getElementById(`marked-file-${username}-${assignmentId}`);
      if (el) el.innerHTML = `<a href="${uploadRes.publicUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:rgba(76,175,80,0.1);border:1px solid #4caf50;border-radius:6px;padding:4px 10px;text-decoration:none;color:#4caf50;font-size:12px">📄 ${file.name} ↓</a>`;
    };
  </script>
</body>
</html>
