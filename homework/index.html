<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homework</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <link rel="stylesheet" href="style.css?v=6" />
  <script src="../auth.js"></script>
  <script>AUTH.requireAuth();</script>
</head>
<body>
  <nav class="navbar">
    <a href="../main/index.html" class="back-link">← Dashboard</a>
    <span class="nav-brand">Homework</span>
    <div class="nav-right">
      <span id="nav-username" class="nav-username"></span>
      <button id="add-hw-btn" class="nav-btn primary hidden">+ Assignment</button>
    </div>
  </nav>

  <main class="content">
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="done">Done</button>
    </div>
    <div id="hw-list" class="hw-list"></div>
    <div id="hw-empty" class="empty-state hidden">No assignments here.</div>
  </main>

  <!-- Editor Panel -->
  <div id="editor-overlay" class="editor-overlay hidden"></div>
  <div id="editor-panel" class="editor-panel hidden">
    <div class="editor-header">
      <h2 id="editor-title">New Assignment</h2>
      <button id="editor-close" class="editor-close">×</button>
    </div>
    <div class="editor-meta">
      <input type="hidden" id="hw-id" />
      <div style="display:flex;gap:10px">
        <input type="text" id="hw-subject" placeholder="Subject (e.g. Math)" class="editor-input" style="flex:1" />
        <input type="date" id="hw-due" class="editor-input" style="flex:1" />
      </div>
      <input type="text" id="hw-title-input" placeholder="Assignment title..." class="editor-title-input" />
      <select id="hw-course" class="editor-select">
        <option value="">No course</option>
      </select>
      <input type="text" id="hw-assign" placeholder="Assign to (leave blank for all, or comma-separated usernames)" class="editor-input" />
    </div>

    <div class="block-toolbar">
      <span class="toolbar-label">Add block:</span>
      <button class="block-add-btn" data-type="header">H Header</button>
      <button class="block-add-btn" data-type="paragraph">¶ Text</button>
      <button class="block-add-btn" data-type="bullets">• List</button>
      <button class="block-add-btn" data-type="question">? Question</button>
      <button class="block-add-btn" data-type="image">🖼 Image</button>
      <button class="block-add-btn" data-type="file">📎 File</button>
      <button class="block-add-btn" data-type="math">∑ Math</button>
      <button class="block-add-btn" data-type="divider">— Divider</button>
    </div>

    <div id="blocks-container" class="blocks-container"></div>

    <div class="editor-footer">
      <p id="editor-msg" class="msg"></p>
      <div class="editor-actions">
        <button id="editor-cancel" class="btn">Cancel</button>
        <button id="editor-save" class="btn primary">Save Assignment</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
