<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Your Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="../auth.js"></script>
  <script>AUTH.requireAuth();</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #222536;
      --border: #2e3248; --text: #e8eaf0; --muted: #6b7280;
      --yellow: #f9a825;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px; width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    h2 { font-size: 22px; font-weight: 600; }
    p { font-size: 13px; color: var(--muted); margin-top: -8px; }
    label { font-size: 12px; color: var(--muted); margin-bottom: -8px; }
    input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 14px; color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.2s; width: 100%;
    }
    input:focus { border-color: var(--yellow); }
    input::placeholder { color: #444; }
    button {
      background: var(--yellow); border: none; border-radius: 8px;
      padding: 12px; color: #1a1a1a; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #e69100; }
    .msg { font-size: 13px; color: var(--muted); min-height: 18px; }
    .msg.error { color: #e05252; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Complete Your Profile</h2>
    <p>This only takes a second — we just need a few details.</p>
    <label>First Name</label>
    <input type="text" id="firstName" placeholder="First name" />
    <label>Last Name</label>
    <input type="text" id="lastName" placeholder="Last name" />
    <label>Date of Birth</label>
    <input type="date" id="dob" />
    <button id="save-btn">Save & Continue</button>
    <p class="msg" id="msg"></p>
  </div>
  <script>
    document.getElementById('save-btn').addEventListener('click', async () => {
      const msg = document.getElementById('msg');
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const dob = document.getElementById('dob').value;
      if (!firstName || !lastName || !dob) {
        msg.textContent = 'All fields are required.'; msg.className = 'msg error'; return;
      }
      msg.textContent = 'Saving...'; msg.className = 'msg';
      const res = await AUTH.api('POST', '/profile', { firstName, lastName, dob });
      if (res.error) { msg.textContent = res.error; msg.className = 'msg error'; return; }
      window.location.href = '../main/index.html';
    });
  </script>
</body>
</html>
