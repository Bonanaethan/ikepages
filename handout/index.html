<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handouts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="../auth.js"></script>
  <script>AUTH.requireAuth();</script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="../main/index.html" class="back-link">← Dashboard</a>
    <span class="nav-brand">Handouts</span>
    <div class="nav-right">
      <span id="nav-username"></span>
      <button id="add-handout-btn" class="nav-btn primary" style="display:none">+ Add Handout</button>
    </div>
  </nav>

  <main class="content">
    <div class="filter-bar" id="filter-bar" style="display:none">
      <select id="course-filter">
        <option value="all">All Courses</option>
      </select>
    </div>

    <div id="handouts-list" class="handouts-grid"></div>

    <!-- Add/Edit Form (teachers only) -->
    <div id="handout-form" class="modal hidden">
      <div class="modal-card">
        <h3 id="form-title">New Handout</h3>
        <input type="hidden" id="h-id" />
        <input type="text" id="h-title" placeholder="Title" />
        <input type="url" id="h-url" placeholder="URL (optional)" />
        <textarea id="h-desc" placeholder="Description"></textarea>
        <textarea id="h-content" placeholder="Content (optional)" style="min-height:120px"></textarea>
        <select id="h-course">
          <option value="">No course</option>
        </select>
        <div class="modal-actions">
          <button id="h-cancel">Cancel</button>
          <button id="h-save" class="primary">Save</button>
        </div>
        <p id="h-msg" class="msg"></p>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
