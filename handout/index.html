<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="../auth.js"></script>
  <script>AUTH.requireAuth();</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2e3248;
      --text: #e8eaf0; --muted: #6b7280; --yellow: #f9a825;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 64px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .back-link {
      color: var(--muted); text-decoration: none; font-size: 13px;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--yellow); }
    .nav-title { font-size: 15px; font-weight: 600; }
    main {
      max-width: 960px; margin: 0 auto; padding: 48px 24px;
    }
    h1 { font-size: 28px; font-weight: 300; margin-bottom: 8px; }
    h1 span { font-weight: 700; color: var(--yellow); }
    p { color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <nav>
    <a href="../main/index.html" class="back-link">← Back</a>
    <span class="nav-title">Handout</span>
    <span></span>
  </nav>
  <main>
    <h1><span>Handout</span></h1>
    <p>Handout content goes here.</p>
  </main>
</body>
</html>
